services:
  nginx:
    image: nginx:1.28.2-alpine3.23
    container_name: songuess-nginx
    restart: unless-stopped
    environment:
      NGINX_HOST: localhost
    depends_on:
      - frontend
    ports:
      - "8443:443"
    volumes:
      - ../infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../infra/nginx/conf.d:/etc/nginx/conf.d:ro
      - ../infra/certs:/etc/nginx/certs:ro
      - frontend_data:/usr/share/nginx/html:ro
    networks:
      - songuess-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: songuess-frontend
    restart: unless-stopped
    # env_file:
    #   - ./.env
    expose:
      - "5173"
    volumes:
      - frontend_data:/app/dist
    depends_on:
      - api-gateway
    networks:
      - songuess-net

  api-gateway:
    build:
      context: ./backend/services/api-gateway
      dockerfile: Dockerfile
      target: production
    container_name: songuess-api-gateway
    restart: unless-stopped
    env_file:
      - ./backend/services/api-gateway/.env
    environment:
      PORT: 4000
      GAME_SERVICE_URL: http://game-service:4001
      AUTH_SERVICE_URL: http://auth-service:4002
      CONTENT_SERVICE_URL: http://content-service:4003
      ITUNES_BASE_URL: https://itunes.apple.com
    expose:
      - "4000"
    depends_on:
      # - game-service
      - auth-service
      - content-service
    networks:
      - songuess-net

  auth-service:
    build:
      context: ./backend/services/auth-service
      dockerfile: Dockerfile
      target: production
    container_name: songuess-auth-service
    restart: unless-stopped
    # env_file:
    #   - ./.env
    environment:
      PORT: 4002
      SERVICE_NAME: auth-service
      # DATABASE_URL: postgresql://...  (lo añadimos cuando conectemos DB)
      # JWT_SECRET: ...                (lo añadimos cuando implementemos login)
    expose:
      - "4002"
    depends_on:
      - postgres
    networks:
      - songuess-net

  content-service:
    build:
      context: ./backend/services/content-service
      dockerfile: Dockerfile
      target: production
    container_name: songuess-content-service
    restart: unless-stopped
    env_file:
      - ./backend/services/content-service/.env
    environment:
      PORT: 4003
      SERVICE_NAME: content-service
    expose:
      - "4003"
    depends_on:
      - redis
    networks:
      - songuess-net

  # game-service:
  #   build:
  #     context: ./services/game-service
  #     dockerfile: Dockerfile
  #   container_name: songuess-game-service
  #   restart: unless-stopped
  #   env_file:
  #     - ./.env
  #   environment:
  #     PORT: 4001
  #     DATABASE_URL: postgresql://songuess:songuess_dev_password@postgres:5432/songuess
  #     SERVICE_NAME: game-service
  #   expose:
  #     - "4001"
  #   depends_on:
  #     - postgres
  #   networks:
  #     - songuess-net

  postgres:
    image: postgres:17.9-alpine3.22
    container_name: songuess-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_password}
      POSTGRES_DB: ${POSTGRES_DB:-postgres_db}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - songuess-net

  redis:
    image: redis:8.4.2-alpine3.22
    container_name: songuess-redis
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    networks:
      - songuess-net

networks:
  songuess-net:
    driver: bridge

volumes:
  frontend_data:
  postgres_data:
  redis_data:
