  #     - postgres_data:/var/lib/postgresql/data
  #   networks:
  #     - songuess-net

  redis:
    image: redis:8.4.2-alpine3.22
    container_name: songuess-redis
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    networks:
      - songuess-net

networks:
  songuess-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
