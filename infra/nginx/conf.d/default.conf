# Necesario para WebSocket upgrade
map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

upstream api_gateway_upstream {
  server api-gateway:4000;
  keepalive 64;
}

upstream frontend_upstream {
  server frontend:5173;
  keepalive 64;
}

resolver 127.0.0.11 valid=10s ipv6=off;

# HTTP -> HTTPS
server {
  listen 80;
  server_name _;
  return 301 https://$host$request_uri;
}

server {
  listen 80;
  server_name _;

  # Si luego activas SSL real, aquí puedes redirigir:
  # return 301 https://$host$request_uri;

  root /usr/share/nginx/html;
  index index.html;

  set $api_gateway http://api-gateway:4000;

  # -----------------------------
  # API REST -> API Gateway
  # -----------------------------
  location /api/ {
    proxy_pass $api_gateway;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
  }

  # -----------------------------
  # Socket.io (WebSocket/long-polling)
  # -----------------------------
  location /socket.io/ {
    proxy_pass $api_gateway;
    proxy_http_version 1.1;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Importante para partidas largas / latencia variable
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_connect_timeout 10s;

    proxy_buffering off;
    proxy_cache off;
  }

  # -----------------------------
  # Assets estáticos (cache agresiva)
  # -----------------------------
  location ~* \.(js|mjs|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800, immutable";
    proxy_pass http://frontend_upstream;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
  }

  # -----------------------------
  # React SPA fallback
  # -----------------------------
  # location / {
  #   try_files $uri /index.html;
  # }

  # -----------------------------
  # Nginx Test
  # -----------------------------
  location / {
    proxy_pass http://frontend_upstream;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
  }

}
