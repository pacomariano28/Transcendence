# Necesario para WebSocket upgrade
map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

upstream api_gateway_upstream {
  server api-gateway:4000;
  keepalive 64;
}

upstream frontend_upstream {
  server frontend:5173;
  keepalive 64;
}

resolver 127.0.0.11 valid=10s ipv6=off;

# intermediate configuration
ssl_protocols TLSv1.2 TLSv1.3;
ssl_ecdh_curve X25519MLKEM768:X25519:prime256v1:secp384r1;
ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
ssl_prefer_server_ciphers off;

# see also ssl_session_ticket_key alternative to stateful session cache
ssl_session_timeout 1d;
ssl_session_cache shared:MozSSL:10m;  # about 40000 sessions

# HTTPS
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  ssl_certificate /etc/nginx/certs/dev.crt;
  ssl_certificate_key /etc/nginx/certs/dev.key;

  # listen 443 ssl;
  # server_name _;

  # # TLS Configuration
  # ssl_certificate     /etc/nginx/certs/dev.crt;
  # ssl_certificate_key /etc/nginx/certs/dev.key;
  # ssl_session_cache   shared:SSL:10m;
  # ssl_session_timeout 10m;
  # ssl_protocols       TLSv1.2 TLSv1.3;
  # ssl_prefer_server_ciphers off;

  root /usr/share/nginx/html;
  index index.html;

  set $api_gateway http://api-gateway:4000;

  # -----------------------------
  # API REST -> API Gateway
  # -----------------------------
  location /api/ {
    proxy_pass $api_gateway;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
  }

  # -----------------------------
  # Socket.io (WebSocket/long-polling)
  # -----------------------------
  location /socket.io/ {
    proxy_pass $api_gateway;
    proxy_http_version 1.1;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Importante para partidas largas / latencia variable
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_connect_timeout 10s;

    proxy_buffering off;
    proxy_cache off;
  }

  # -----------------------------
  # Assets estáticos (cache agresiva)
  # -----------------------------
  location ~* \.(js|mjs|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800, immutable";
    proxy_pass http://frontend_upstream;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
  }

  # -----------------------------
  # React SPA fallback
  # -----------------------------
  # location / {
  #   try_files $uri /index.html;
  # }

  # -----------------------------
  # Nginx Test
  # -----------------------------
  location / {
    proxy_pass http://frontend_upstream;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    proxy_connect_timeout 5s;
    proxy_send_timeout 3600s;  # Increased from 30s
    proxy_read_timeout 3600s;  # Increased from 30s
  }
}
